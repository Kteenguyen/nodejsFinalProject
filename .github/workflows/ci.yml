name: PhoneWorld CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20
        node-version: '20'
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm install

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Frontend Application
      run: |
        cd frontend
        npm run build

    - name: Run Backend Health Check Verification
      run: npm test
